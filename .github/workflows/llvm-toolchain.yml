name: LLVM CORE-V toolchain

on:
  pull_request:
    paths:
      - ".github/workflows/llvm-toolchain.yml"
      - "Makefile"
      - ".gitmodules"
      - "llvm-project/**"
      - "picolibc/**"
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: llvm-corev-toolchain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build LLVM toolchain and runtimes (Linux)
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:20.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive
      BUILD_ROOT: ${{ github.workspace }}/.ci
      LLVM_BUILD_DIR: ${{ github.workspace }}/.ci/build-llvm-riscv
      LLVM_RUNTIMES_BUILD_DIR: ${{ github.workspace }}/.ci/build-llvm-riscv-runtimes
      LLVM_CMAKE_BUILD_TYPE: Release
      CLANG_RUNTIMES_ROOT: ${{ github.workspace }}/.ci/build-llvm-riscv/lib/clang-runtimes
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPRESS: "true"
      TMP: /tmp

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            ccache \
            git \
            python3 \
            python3-pip \
            ripgrep \
            zsh
          python3 -m pip install --no-cache-dir \
            cmake \
            meson \
            ninja

      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-${{ runner.arch }}-${{ hashFiles('Makefile', '.github/workflows/llvm-toolchain.yml') }}
          restore-keys: |
            ccache-linux-${{ runner.arch }}-

      - name: Show Linux package baseline
        run: |
          ldd --version | head -n 1
          cmake --version | head -n 1
          meson --version
          ninja --version
          ccache --version | head -n 1
          ccache --zero-stats

      - name: Build LLVM CORE-V compiler
        run: |
          make build-llvm JOBS="$(nproc)" LLVM_COMPILER_LAUNCHER=ccache

      - name: Build and install CORE-V multilib runtimes
        run: |
          make install-llvm-runtimes JOBS="$(nproc)" LLVM_COMPILER_LAUNCHER=ccache

      - name: Run Clang tests
        run: |
          make check-clang JOBS="$(nproc)"

      - name: Run LLVM tests
        run: |
          make check-llvm JOBS="$(nproc)"

      - name: Run LLD tests
        run: |
          make check-lld JOBS="$(nproc)"

      - name: Verify installed CORE-V multilibs
        run: |
          test -f "${CLANG_RUNTIMES_ROOT}/multilib.yaml"
          make print-llvm-multilibs | while read -r multilib; do
            libdir="${CLANG_RUNTIMES_ROOT}/riscv32-unknown-elf/${multilib}/lib"
            test -f "${libdir}/libc.a"
            test -f "${libdir}/libc++.a"
            test -f "${libdir}/libc++abi.a"
            test -f "${libdir}/libunwind.a"
            test -f "${libdir}/libclang_rt.builtins.a"
          done

      - name: Package LLVM CORE-V toolchain
        run: |
          make package-llvm-toolchain \
            PACKAGE_ARCHIVE="${BUILD_ROOT}/artifacts/llvm-corev-toolchain-linux.tar.gz" \
            JOBS="$(nproc)" \
            LLVM_COMPILER_LAUNCHER=ccache

      - name: Show compiler cache statistics
        if: always()
        run: |
          ccache --show-stats

      - name: Upload LLVM CORE-V toolchain
        uses: actions/upload-artifact@v4
        with:
          name: llvm-corev-toolchain-linux
          path: ${{ env.BUILD_ROOT }}/artifacts/llvm-corev-toolchain-linux.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build LLVM toolchain and runtimes (macOS)
    runs-on: macos-14
    timeout-minutes: 360

    env:
      BUILD_ROOT: ${{ github.workspace }}/.ci
      LLVM_BUILD_DIR: ${{ github.workspace }}/.ci/build-llvm-riscv
      LLVM_RUNTIMES_BUILD_DIR: ${{ github.workspace }}/.ci/build-llvm-riscv-runtimes
      LLVM_CMAKE_BUILD_TYPE: Release
      CLANG_RUNTIMES_ROOT: ${{ github.workspace }}/.ci/build-llvm-riscv/lib/clang-runtimes
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPRESS: "true"
      TMP: /tmp

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          brew update
          brew install ccache cmake meson ninja ripgrep

      - name: Compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ runner.arch }}-${{ hashFiles('Makefile', '.github/workflows/llvm-toolchain.yml') }}
          restore-keys: |
            ccache-macos-${{ runner.arch }}-

      - name: Show macOS package baseline
        run: |
          cmake --version | head -n 1
          meson --version
          ninja --version
          ccache --version | head -n 1
          ccache --zero-stats

      - name: Build LLVM CORE-V compiler
        run: |
          make build-llvm JOBS="$(sysctl -n hw.ncpu)" LLVM_COMPILER_LAUNCHER=ccache

      - name: Build and install CORE-V multilib runtimes
        run: |
          make install-llvm-runtimes JOBS="$(sysctl -n hw.ncpu)" LLVM_COMPILER_LAUNCHER=ccache

      - name: Run Clang tests
        run: |
          make check-clang JOBS="$(sysctl -n hw.ncpu)"

      - name: Run LLVM tests
        run: |
          make check-llvm JOBS="$(sysctl -n hw.ncpu)"

      - name: Run LLD tests
        run: |
          make check-lld JOBS="$(sysctl -n hw.ncpu)"

      - name: Verify installed CORE-V multilibs
        run: |
          test -f "${CLANG_RUNTIMES_ROOT}/multilib.yaml"
          make print-llvm-multilibs | while read -r multilib; do
            libdir="${CLANG_RUNTIMES_ROOT}/riscv32-unknown-elf/${multilib}/lib"
            test -f "${libdir}/libc.a"
            test -f "${libdir}/libc++.a"
            test -f "${libdir}/libc++abi.a"
            test -f "${libdir}/libunwind.a"
            test -f "${libdir}/libclang_rt.builtins.a"
          done

      - name: Package LLVM CORE-V toolchain
        run: |
          make package-llvm-toolchain \
            PACKAGE_ARCHIVE="${BUILD_ROOT}/artifacts/llvm-corev-toolchain-macos.tar.gz" \
            JOBS="$(sysctl -n hw.ncpu)" \
            LLVM_COMPILER_LAUNCHER=ccache

      - name: Show compiler cache statistics
        if: always()
        run: |
          ccache --show-stats

      - name: Upload LLVM CORE-V toolchain
        uses: actions/upload-artifact@v4
        with:
          name: llvm-corev-toolchain-macos
          path: ${{ env.BUILD_ROOT }}/artifacts/llvm-corev-toolchain-macos.tar.gz
          if-no-files-found: error
